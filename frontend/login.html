<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BlogVerse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <h1>Welcome Back ✨</h1>
    <p class="auth-subtitle">Login to continue writing and exploring blogs</p>

    <input
      type="email"
      id="loginEmail"
      placeholder="Email address"
      onkeydown="moveNext(event,'loginPassword')"
    >

    <div class="password-box">
      <input
        type="password"
        id="loginPassword"
        placeholder="Password"
        onkeydown="submitOnEnter(event,loginUser)"
      >

      <button
        type="button"
        class="toggle-btn"
        onclick="togglePassword('loginPassword', this)"
      >
        Show
      </button>
    </div>

    <button class="auth-btn" onclick="loginUser()">Login</button>

    <p>
      <a href="forgot-password.html">Forgot Password?</a>
    </p>

    <p>
      New to BlogVerse?
      <a href="register.html">Create account</a>
    </p>

    <p>
      <a href="index.html">← Back to Home</a>
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Blog | BlogVerse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Create Blog ✍️</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <button onclick="logoutUser()">Logout</button>
    </nav>
  </header>

  <section class="auth-container">
    <div class="form-box">
      <h2>Share Your Story</h2>
      <p class="dash-subtitle">Write meaningful blogs and optionally add an image or video.</p>

      <input
        type="text"
        id="postTitle"
        placeholder="Blog title"
      >

      <textarea
        id="postContent"
        rows="7"
        placeholder="Write your blog content..."
      ></textarea>

      <label class="file-label">Optional Media</label>
      <input
        type="file"
        id="postMedia"
        accept="image/*,video/*"
      >

      <div class="guidelines-box">
        <h3>📜 BlogVerse Guidelines</h3>
        <p>✅ Be respectful</p>
        <p>✅ Share original content</p>
        <p>✅ No adult or harmful content</p>
        <p>✅ No abusive language</p>
        <p>✅ Respect privacy</p>
      </div>

      <button onclick="createPost()">Publish Blog</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>

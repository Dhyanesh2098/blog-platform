<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | BlogVerse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <h1>🔐 Reset Password</h1>
    <p class="auth-subtitle">Create a new secure password for your BlogVerse account</p>

    <div class="password-box">
      <input
        type="password"
        id="newPassword"
        placeholder="New password"
        onkeydown="moveNext(event,'confirmPassword')"
      >

      <button type="button" class="toggle-btn" onclick="togglePassword('newPassword', this)">
        Show
      </button>
    </div>

    <div class="password-box">
      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm password"
        onkeydown="submitOnEnter(event,resetPassword)"
      >

      <button type="button" class="toggle-btn" onclick="togglePassword('confirmPassword', this)">
        Show
      </button>
    </div>

    <button class="auth-btn" onclick="resetPassword()">Update Password</button>

    <p>
      <a href="login.html">← Back to Login</a>
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>

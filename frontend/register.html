<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | BlogVerse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <h1>Join BlogVerse 🚀</h1>
    <p class="auth-subtitle">Create your account and start sharing your ideas</p>

    <input
      type="text"
      id="registerName"
      placeholder="Full name"
      onkeydown="moveNext(event,'registerEmail')"
    >

    <input
      type="email"
      id="registerEmail"
      placeholder="Email address"
      onkeydown="moveNext(event,'registerPassword')"
    >

    <div class="password-box">
      <input
        type="password"
        id="registerPassword"
        placeholder="Create password"
        onkeydown="submitOnEnter(event,registerUser)"
      >

      <button
        type="button"
        class="toggle-btn"
        onclick="togglePassword('registerPassword', this)"
      >
        Show
      </button>
    </div>

    <button class="auth-btn" onclick="registerUser()">Create Account</button>

    <p>
      Already have an account?
      <a href="login.html">Login</a>
    </p>

    <p>
      <a href="index.html">← Back to Home</a>
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
